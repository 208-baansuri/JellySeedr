<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>JellySeedr</title>
</head>

<body>
    <div id="JellySeedrConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
        data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <div id="SeedrSection" style="margin-top: 20px;">
                    <div class="inputContainer">
                        <div style="display: flex; align-items: center;">
                            <h2 style="margin: 0;">Seedr</h2>
                            <button class="fab emby-button" title="Settings" id="seedrSettingsToggleBtn"
                                style="margin-left: 1em;">
                                <span class="material-icons settings" aria-hidden="true"></span>
                            </button>
                        </div>
                        <div id="seedrSettingsBlock"
                            style="display: none; margin-top: 15px; margin-bottom: 25px; padding: 1em; background: rgba(0,0,0,0.2); border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); max-width: 52em;">
                            <h3 style="margin-top: 0; margin-bottom: 15px;">Settings</h3>

                            <div class="checkboxContainer checkboxContainer-withcolor">
                                <label>
                                    <input type="checkbox" is="emby-checkbox" id="deleteAfterDownloadCheckbox" />
                                    <span>Delete files from Seedr after download</span>
                                </label>
                            </div>

                            <div class="selectContainer" style="margin-top: 15px;">
                                <label for="nameClashResolutionSelect"
                                    style="display: block; margin-bottom: 5px;">Naming Clash Resolution</label>
                                <select id="nameClashResolutionSelect" class="emby-select-withcolor emby-select">
                                    <option value="Rename">Rename</option>
                                    <option value="Overwrite">Overwrite</option>
                                    <option value="Skip">Skip</option>
                                </select>
                                <div class="fieldDescription">
                                    <span>Choose what to do if the file name already exists in your library.</span>
                                </div>
                                <div class="selectArrowContainer">
                                    <span class="selectArrow material-icons keyboard_arrow_down"
                                        aria-hidden="true"></span>
                                </div>
                            </div>

                            <div class="checkboxContainer checkboxContainer-withcolor" style="margin-top: 15px;">
                                <label>
                                    <input type="checkbox" is="emby-checkbox" id="autoDownloadCheckbox" />
                                    <span>Auto download files with matching extensions</span>
                                </label>
                            </div>

                            <div class="inputContainer" style="margin-top: 15px;">
                                <label for="downloadFileTypesInput" style="display: block; margin-bottom: 5px;">File
                                    Extensions (separated by space)</label>
                                <input type="text" id="downloadFileTypesInput" class="emby-input"
                                    placeholder="mp4 srt mkv" />
                            </div>
                        </div>
                        <div id="seedrStatus">
                            <span id="seedr_status_text">checking...</span>
                            <span type="button" id="seedr_logout_btn" style="display:none;"
                                class="mupTextLink">Logout</span>
                            <div id="seedr_storage" style="display:none; margin-top:.25em;">Storage Used: <span
                                    id="seedr_storage_text"></span></div>
                        </div>

                        <div id="seedrLogin" style="display:none; margin-top: 20px;">
                            <form id="seedrLoginForm">
                                <input type="text" id="seedr_username" class="emby-input" placeholder="Username" />
                                <input type="password" id="seedr_password" class="emby-input" placeholder="Password"
                                    style="margin-top: 20px;" />
                                <div class="checkboxContainer checkboxContainer-withcolor" style="margin-top: 15px;">
                                    <label>
                                        <input type="checkbox" is="emby-checkbox" id="seedr_save_credentials" />
                                        <span>Save credentials securely on server</span>
                                    </label>
                                </div>
                                <button is="emby-button" type="submit" id="seedr_login_btn"
                                    class="raised button-submit block emby-button"
                                    style="width: max-content; margin-top: 20px;">
                                    <span>Login to Seedr</span>
                                </button>
                            </form>
                        </div>

                        <div id="seedrActions" style="display:none; margin-top: 20px;">
                            <form id="seedrSubmitForm">
                                <div id="jellyfinLibrariesSection">
                                    <h3>Download files to</h3>
                                    <div class="selectContainer">
                                        <select id="jellyfinLibrary" class="emby-select-withcolor emby-select">
                                            <option value="">Loading...</option>
                                        </select>
                                        <div class="selectArrowContainer">
                                            <span class="material-icons keyboard_arrow_down" aria-hidden="true"
                                                style="margin-top: 0.2em;"></span>
                                        </div>
                                    </div>
                                </div>
                                <h3 style="margin-top: 20px;">Torrent file or link</h3>
                                <div style="display:flex; gap:.5em; align-items:center;">
                                    <input type="text" id="seedrInput" class="emby-input"
                                        placeholder="magnet:? or https://... or leave empty and choose a .torrent file"
                                        style="flex:1;" />
                                    <input type="file" id="seedrFile" accept=".torrent" style="display:none;" />
                                    <button type="button" id="seedr_choose_file"
                                        class="raised button-submit block emby-button"
                                        style="width: max-content;">Choose file</button>
                                </div>
                                <div style="display:flex; gap:.5em; align-items:center; margin-top:.5em;">
                                    <button is="emby-button" type="submit" id="seedr_submit_btn"
                                        class="raised button-submit block emby-button">Start Seedr Download</button>
                                    <button is="emby-button" type="button" id="seedr_browse_files_btn"
                                        class="raised button-submit block emby-button">Browse Seedr Files</button>
                                </div>
                                <p id="seedr_message" style="color:green;"></p>
                            </form>
                            <div id="activeTasksSection" style="margin-top: 30px; max-width: 54em">
                                <div
                                    style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
                                    <h3 style="margin: 0;">Task Status</h3>
                                    <button type="button" id="clearAllTasksBtn" class="raised emby-button"
                                        style="margin: 0; padding: 4px 10px; width: max-content; display: none; font-size: 0.9em;">Clear
                                        Completed</button>
                                </div>
                                <div id="activeTasksList" class="paperList">
                                    <div class="listItem">
                                        <div class="listItemBody">
                                            <div class="listItemBodyText secondary">No active tasks</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script type="text/javascript">
            var JellySeedrConfig = {
                pluginUniqueId: '50be6aa0-120a-48e1-9bf1-e95a867587e0'
            };

            let libraryOptions;

            async function fetchWithAuth(url, method, body) {
                const reqInit = {
                    method: method,
                    headers: {
                        Authorization: "MediaBrowser Token=" + ApiClient.accessToken(),
                    },
                    body: body,
                };

                return await fetch(url, reqInit);
            }

            async function updateSeedrUI() {
                try {
                    Dashboard.showLoadingMsg('Updating ...');
                    const res = await fetchWithAuth('/jellyseedr/status', 'GET');
                    if (!res.ok) {
                        throw new Error((await res.json()).message);
                    }
                    const status = await res.json();
                    const loggedIn = status.loggedIn;
                    document.getElementById('seedr_status_text').textContent = loggedIn ? 'Logged in as ' + (status.username || '') : 'Login using Seeder Username and Password';
                    if (loggedIn) {
                        document.getElementById('seedrLogin').style.display = 'none';
                        document.getElementById('seedrActions').style.display = '';
                        // Show logout button when logged in
                        const logoutBtn = document.getElementById('seedr_logout_btn');
                        if (logoutBtn) logoutBtn.style.display = '';
                        if (status.storage) {
                            const usedBytes = Number(status.storage.usedBytes || 0);
                            const totalBytes = Number(status.storage.totalBytes || 0);
                            const toGB = (b) => b / (1024 * 1024 * 1024);
                            const usedGB = toGB(usedBytes);
                            const totalGB = toGB(totalBytes);
                            document.getElementById('seedr_storage_text').textContent = usedGB.toFixed(1) + ' GB / ' + totalGB.toFixed(1) + ' GB';
                            document.getElementById('seedr_storage').style.display = '';
                        }
                    }
                    else {
                        document.getElementById('seedrLogin').style.display = '';
                        document.getElementById('seedrActions').style.display = 'none';
                        document.getElementById('seedr_storage').style.display = 'none';
                        // Hide logout when not logged in
                        const logoutBtn = document.getElementById('seedr_logout_btn');
                        if (logoutBtn) logoutBtn.style.display = 'none';
                    }
                }
                catch (e) {
                    console.warn('Seedr status failed', e);
                    document.getElementById('seedr_status_text').textContent = 'Login using Seeder Username and Password';
                    document.getElementById('seedrLogin').style.display = '';
                    document.getElementById('seedrActions').style.display = 'none';
                    document.getElementById('seedr_storage').style.display = 'none';
                }
                finally {
                    Dashboard.hideLoadingMsg();
                }
            }

            let lastSavedExtensions = '';

            async function loadPluginSettings() {
                try {
                    const config = await ApiClient.getPluginConfiguration(JellySeedrConfig.pluginUniqueId);

                    document.getElementById('deleteAfterDownloadCheckbox').checked = config.DeleteAfterDownload !== false;
                    document.getElementById('autoDownloadCheckbox').checked = config.AutoDownload !== false;

                    const resolutionSelect = document.getElementById('nameClashResolutionSelect');
                    if (resolutionSelect) {
                        resolutionSelect.value = config.NameClashResolution || 'Rename';
                    }

                    const extensionsInput = document.getElementById('downloadFileTypesInput');
                    if (extensionsInput) {
                        let extArray = [];
                        if (Array.isArray(config.DownloadFileTypes)) {
                            extArray = config.DownloadFileTypes;
                        } else if (config.DownloadFileTypes && typeof config.DownloadFileTypes === 'object') {
                            extArray = Object.values(config.DownloadFileTypes);
                        }
                        const extStr = extArray.join(' ');
                        extensionsInput.value = extStr;
                        lastSavedExtensions = extStr;
                    }
                } catch (e) {
                    console.warn('Failed to load plugin settings', e);
                }
            }

            async function savePluginSettings() {
                try {
                    const config = await ApiClient.getPluginConfiguration(JellySeedrConfig.pluginUniqueId);

                    const deleteVal = document.getElementById('deleteAfterDownloadCheckbox').checked;
                    const autoVal = document.getElementById('autoDownloadCheckbox').checked;
                    const clashVal = document.getElementById('nameClashResolutionSelect').value;
                    const inputVal = document.getElementById('downloadFileTypesInput').value.trim();

                    const extArray = inputVal ? inputVal.split(/\s+/).filter(Boolean) : [];
                    const normalizedInput = extArray.join(' ');

                    if (config.DeleteAfterDownload === deleteVal &&
                        config.AutoDownload === autoVal &&
                        config.NameClashResolution === clashVal &&
                        lastSavedExtensions === normalizedInput) {
                        return;
                    }

                    config.DeleteAfterDownload = deleteVal;
                    config.AutoDownload = autoVal;
                    config.NameClashResolution = clashVal;
                    config.DownloadFileTypes = extArray;

                    await ApiClient.updatePluginConfiguration(JellySeedrConfig.pluginUniqueId, config);
                    lastSavedExtensions = normalizedInput;
                } catch (e) {
                    console.warn('Failed to save plugin settings', e);
                }
            }

            function mapLibraryDetails(libraries) {
                if (!libraries || libraries.length === 0) return new Map();
                const result = new Map();
                libraries.forEach(lib => {
                    lib.Locations.forEach((loc, idx) => {
                        const key = lib.ItemId + '|' + idx; // in case multiple locations, use index to differentiate
                        result.set(key, {
                            name: lib.Name + ' - ' + loc,
                            storagePath: loc
                        });
                    });
                });
                return result;
            }

            function getSelectedLibraryPath() {
                const select = document.getElementById('jellyfinLibrary');
                return libraryOptions?.get(select.value).storagePath || ''
            }

            async function loadJellyfinLibraries() {
                try {
                    const res = await fetchWithAuth('/jellyseedr/libraries', 'GET');
                    if (!res.ok) {
                        throw new Error('Unable to load libraries');
                    }

                    const libraries = await res.json();
                    const select = document.getElementById('jellyfinLibrary');

                    if (!libraries || libraries.length === 0) {
                        // leave select with only placeholder
                        select.innerHTML = '<option value="0">No libraries found</option>';
                        return;
                    }

                    libraryOptions = mapLibraryDetails(libraries);
                    const pluginConfig = await ApiClient.getPluginConfiguration(JellySeedrConfig.pluginUniqueId);
                    const selectedLib = pluginConfig.SelectedLibrary || '';

                    select.innerHTML = ''; // clear any existing options
                    libraryOptions.forEach((lib, key) => {
                        const option = document.createElement('option');
                        option.value = key;
                        option.textContent = lib.name;
                        if (key === selectedLib) {
                            option.selected = true;
                        }
                        select.appendChild(option);
                    });
                }
                catch (e) {
                    console.warn('Failed to load Jellyfin libraries', e);
                    const section = document.getElementById('jellyfinLibrariesSection');
                    const status = document.getElementById('jellyfinLibrariesStatus');
                    section.style.display = '';
                    status.textContent = 'Unable to load Jellyfin libraries.';
                }
            }

            async function saveSelectedLibrary(libKey) {
                if (!libraryOptions || !libraryOptions.get(libKey)) {
                    alert('Invalid library selected');
                    return;
                }
                const pluginConfig = await ApiClient.getPluginConfiguration(JellySeedrConfig.pluginUniqueId);
                pluginConfig.SelectedLibrary = libKey;
                await ApiClient.updatePluginConfiguration(JellySeedrConfig.pluginUniqueId, pluginConfig);
            }

            document.getElementById('jellyfinLibrary').addEventListener('change', function (e) {
                const libKey = e.target.value;
                saveSelectedLibrary(libKey);
            });

            async function seedrLogin() {
                try {
                    Dashboard.showLoadingMsg('Logging in...');
                    const username = document.getElementById('seedr_username').value.trim();
                    const password = document.getElementById('seedr_password').value;
                    const saveCredentials = document.getElementById('seedr_save_credentials').checked;
                    const form = new FormData();
                    form.set('username', username);
                    form.set('password', password);
                    form.set('saveCredentials', saveCredentials);
                    const res = await fetchWithAuth('/jellyseedr/login', 'POST', form);
                    if (res.ok) {
                        document.getElementById('seedr_username').value = '';
                        document.getElementById('seedr_password').value = '';
                        document.getElementById('seedr_save_credentials').checked = false;
                        Dashboard.hideLoadingMsg();
                        await updateSeedrUI();
                    }
                    else {
                        const js = await res.json();
                        alert(js.message || 'Login failed');
                        Dashboard.hideLoadingMsg();
                    }
                }
                catch (e) {
                    console.warn('Seedr login failed', e);
                    alert('Login failed: ' + e.message);
                    Dashboard.hideLoadingMsg();
                }
            }

            document.getElementById('seedrLoginForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                await seedrLogin();
            });

            document.getElementById('seedr_choose_file').addEventListener('click', function () {
                document.getElementById('seedrFile').click();
            });

            document.getElementById('seedrFile').addEventListener('change', function (e) {
                const f = e.target.files[0];
                if (f) {
                    document.getElementById('seedrInput').value = f.name;
                }
            });

            document.getElementById('seedrSubmitForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const fileInput = document.getElementById('seedrFile');
                const text = document.getElementById('seedrInput').value.trim();
                const form = new FormData();
                if (fileInput.files && fileInput.files.length > 0) {
                    form.append('torrentFile', fileInput.files[0]);
                }
                else {
                    form.set('input', text);
                }
                form.set('destinationPath', getSelectedLibraryPath());

                const res = await fetchWithAuth('/jellyseedr/submit', 'POST', form);
                if (res.ok) {
                    const js = await res.json();
                    const msgEl = document.getElementById('seedr_message');
                    msgEl.textContent = js.message || 'Submitted';
                    setTimeout(function () {
                        if (msgEl.textContent === (js.message || 'Submitted')) {
                            msgEl.textContent = '';
                        }
                    }, 5000);
                    // clear file after submit
                    document.getElementById('seedrFile').value = '';
                    document.getElementById('seedrInput').value = '';
                    return;
                }
                else {
                    const js = await res.json();
                    alert(js.message || 'Submit failed');
                }
            });

            document.getElementById('seedr_logout_btn').addEventListener('click', async function (e) {
                e.preventDefault();
                const res = await fetchWithAuth('/jellyseedr/logout', 'POST', null);
                if (res.ok) {
                    await updateSeedrUI();
                }
                else {
                    const js = await res.json();
                    alert(js.message || 'Logout failed');
                }
            });

            let taskPollingInterval = null;

            async function loadActiveTasks() {
                try {
                    const res = await fetchWithAuth('/jellyseedr/tasks', 'GET');
                    if (!res.ok) return;
                    const tasks = await res.json();

                    const listContainer = document.getElementById('activeTasksList');
                    if (!listContainer) return;

                    if (!tasks || tasks.length === 0) {
                        listContainer.innerHTML = '<div class="listItem"><div class="listItemBody"><div class="listItemBodyText secondary">No active tasks</div></div></div>';
                        const clearBtn = document.getElementById('clearAllTasksBtn');
                        if (clearBtn) clearBtn.style.display = 'none';
                        return;
                    }

                    let html = '';
                    let hasClearable = false;
                    tasks.forEach(task => {
                        let name = '';
                        let detailsText = '';
                        let showCross = false;

                        const taskId = task.Id || task.id;

                        let statusDesc = task.Status || task.status;
                        const statusMap = ['Pending', 'In Progress', 'Completed', 'Failed', 'Cancelled'];
                        if (typeof statusDesc === 'number') {
                            statusDesc = statusMap[statusDesc] || 'Unknown';
                        }

                        const currentStatus = task.Status || task.status;
                        if (currentStatus === 2 || currentStatus === 3 || currentStatus === 4 ||
                            currentStatus === 'Completed' || currentStatus === 'Failed' || currentStatus === 'Cancelled') {
                            showCross = true;
                        }

                        const isCompleted = (currentStatus === 2 || currentStatus === 'Completed');
                        const isFailed = (currentStatus === 3 || currentStatus === 'Failed');
                        const isCancelled = (currentStatus === 4 || currentStatus === 'Cancelled');

                        // Type enum: Torrent = 0, Fetch = 1, Delete = 2
                        if (task.Type === 0 || task.type === 0 || task.Type === 'Torrent' || task.type === 'Torrent') {
                            name = 'Torrent: ' + ((task.TorrentTask || task.torrentTask)?.TorrentName);
                            if (isCompleted || isFailed || isCancelled) {
                                detailsText = statusDesc;
                            } else {
                                detailsText = statusDesc + ' - Torrent Download: ' + ((task.TorrentTask || task.torrentTask)?.Progress || 0) + '%';
                            }
                        } else if (task.Type === 1 || task.type === 1 || task.Type === 'Fetch' || task.type === 'Fetch') {
                            const fetchTask = task.FetchTask || task.fetchTask;
                            name = 'Fetch: ' + (fetchTask?.SourceFileName);
                            if (isCompleted || isFailed || isCancelled) {
                                detailsText = statusDesc;
                            } else {
                                const bytes = fetchTask?.BytesCopied || 0;
                                const total = fetchTask?.FileSize || 0;
                                const pct = total > 0 ? ((bytes / total) * 100).toFixed(1) : 0;
                                detailsText = statusDesc + ' - Fetching file: ' + pct + '% (' + formatBytes(bytes) + ' / ' + formatBytes(total) + ')';
                            }
                        } else if (task.Type === 2 || task.type === 2 || task.Type === 'Delete' || task.type === 'Delete') {
                            name = 'Cleanup: ' + ((task.DeleteTask || task.deleteTask)?.Path || 'Folder');
                            detailsText = statusDesc;
                        }

                        const errorMsg = task.ErrorMessage || task.errorMessage;
                        const errorHtml = (isFailed && errorMsg) ? ' <span style="color:#ff5252; margin-left:0.5em; text-align: left;">(Error: ' + errorMsg + ')</span>' : '';

                        html += '<div class="listItem paperListItem" style="display:flex; align-items:center; justify-content:flex-start; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; width: 100%; box-sizing: border-box;">' +
                            '<div style="flex:1; display:flex; align-items:center; justify-content:flex-start; text-align: left; gap: 1em; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-right: 1em;">' +
                            '<span style="font-weight: 500; text-align: left; min-width: fit-content;">' + name + '</span>' +
                            '<span class="secondary" style="text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + detailsText + errorHtml + '</span>' +
                            '</div>';

                        if (showCross) {
                            hasClearable = true;
                            html += '<button type="button" class="paper-icon-button-light emby-button remove-task-btn" data-task-id="' + (task.Id || task.id) + '" title="Remove Task" style="background:transparent; border:none; color:inherit; cursor:pointer; padding: 5px; display: flex; align-items: center; justify-content: center; margin-left: auto; flex-shrink: 0;">' +
                                '<span class="material-icons">close</span>' +
                                '</button>';
                        }

                        html += '</div>';
                    });

                    listContainer.innerHTML = html;
                    const clearBtn = document.getElementById('clearAllTasksBtn');
                    if (clearBtn) {
                        clearBtn.style.display = hasClearable ? '' : 'none';
                    }
                } catch (e) {
                    console.warn('Failed to load active tasks', e);
                }
            }

            function formatBytes(bytes, decimals = 2) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            }

            async function removeActiveTask(taskId) {
                try {
                    const form = new FormData();
                    form.append('taskId', taskId);
                    const res = await fetchWithAuth('/jellyseedr/tasks/remove', 'POST', form);
                    if (res.ok) {
                        await loadActiveTasks();
                    } else {
                        const js = await res.json();
                        alert(js.message || 'Failed to remove task');
                    }
                } catch (e) {
                    console.warn('Failed to remove task', e);
                }
            }

            async function clearAllCompletedTasks() {
                try {
                    const res = await fetchWithAuth('/jellyseedr/tasks/clear-completed', 'POST', null);
                    if (res.ok) {
                        await loadActiveTasks();
                    } else {
                        const js = await res.json();
                        alert(js.message || 'Failed to clear tasks');
                    }
                } catch (e) {
                    console.warn('Failed to clear completed tasks', e);
                }
            }

            function startTaskPolling() {
                loadActiveTasks();
                if (taskPollingInterval) clearInterval(taskPollingInterval);
                taskPollingInterval = setInterval(loadActiveTasks, 3000);
            }

            function stopTaskPolling() {
                if (taskPollingInterval) {
                    clearInterval(taskPollingInterval);
                    taskPollingInterval = null;
                }
            }

            document.querySelector('#JellySeedrConfigPage').addEventListener('pageshow', async function () {
                await updateSeedrUI();
                await loadJellyfinLibraries();
                await loadPluginSettings();

                // Bind settings change listeners
                document.getElementById('deleteAfterDownloadCheckbox').addEventListener('change', savePluginSettings);
                document.getElementById('autoDownloadCheckbox').addEventListener('change', savePluginSettings);
                document.getElementById('nameClashResolutionSelect').addEventListener('change', savePluginSettings);
                document.getElementById('downloadFileTypesInput').addEventListener('change', savePluginSettings);

                document.getElementById('seedrSettingsToggleBtn').onclick = function () {
                    const settingsBlock = document.getElementById('seedrSettingsBlock');
                    if (settingsBlock.style.display === 'none') {
                        settingsBlock.style.display = 'block';
                    } else {
                        settingsBlock.style.display = 'none';
                    }
                };

                const clearBtn = document.getElementById('clearAllTasksBtn');
                if (clearBtn) {
                    clearBtn.onclick = function () {
                        clearAllCompletedTasks();
                    };
                }

                const listContainer = document.getElementById('activeTasksList');
                if (listContainer) {
                    listContainer.onclick = function (e) {
                        const btn = e.target.closest('.remove-task-btn');
                        if (btn) {
                            const taskId = btn.getAttribute('data-task-id');
                            if (taskId) {
                                removeActiveTask(taskId);
                            }
                        }
                    };
                }

                startTaskPolling();
            });

            document.querySelector('#JellySeedrConfigPage').addEventListener('pagehide', function () {
                stopTaskPolling();
            });

        </script>
        <script type="text/javascript" src="/jellyseedr/seedr-browser.js"></script>
        <style>
            .mupTextLink {
                color: #5AAEFF;
                cursor: pointer;
            }

            .mupTextLink:hover {
                text-decoration: underline;
            }
        </style>
    </div>
</body>

</html>
